<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMB from Spherical Harmonics</title>
    <link rel="icon" href="media/Simons_logo_small.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<div id="header">

    <img class="logo" src="media/Simons_logo_small.gif">

    <div id="titleBlock">
        <h1>CMB simulation with Spherical Harmonics</h1>
        <div class="subtitle">
            Designed by Jonathan Byrd
        </div>

    </div>

</div>

<div id="canvasRow">
    <div class="panel">
        <h2>Single mode Y<sub>&ell;m</sub></h2>
        <div id="orbitalViewer"></div>
    </div>

    <div class="panel">
        <h2 id="skyTitle">Accumulated sky</h2>
        <canvas id="cmbCanvas" width="500" height="250"></canvas>
    </div>
</div>

<div id="controlsRow">

    <div class="controlColumn leftControls">

    <label class="controlItem">
        <span class="controlLabel">Maximum &ell;:</span>
        <input id="lmaxSlider" type="range" min="1" max="30" value="1">
        <span id="lmaxValue">1</span>
    </label>

    <label class="controlItem">
        <span class="controlLabel">m:</span>
        <input id="mSlider" type="range" min="0" max="1" value="0">
        <span id="mValue">0</span>
    </label>

</div>

    <div class="controlColumn rightControls">

    <label class="controlItem checkboxItem">
        <input id="singleEllCheckbox" type="checkbox">
        Show only current ℓ
    </label>

    <button id="buildUniverseButton">
        Build universe
    </button>

    <button id="newSeedButton">
        New random universe
    </button>

</div>

<div>

<p>
    This map is built by randomly adding spherical-harmonic-like modes up to the selected maximum &ell;.
</p>

<footer>
    Built using Planck CMB power spectrum data.<br>
</footer>

<script src="cmb_harmonics.js"></script>
</body>
</html>
